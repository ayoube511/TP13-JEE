<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Profil - OAuth2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #667eea;
            margin-bottom: 15px;
        }
        .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        h2 { color: #333; margin-bottom: 5px; }
        .email-badge {
            display: inline-block;
            background: #f0f4ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        .info-table tr { border-bottom: 1px solid #f0f0f0; }
        .info-table td { padding: 12px 8px; font-size: 14px; }
        .info-table td:first-child {
            color: #888;
            font-weight: bold;
            width: 40%;
        }
        .info-table td:last-child { color: #333; }
        .success-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .btn-logout {
            display: block;
            width: 100%;
            padding: 12px;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            margin-top: 25px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.85; }
        .btn-home {
            display: block;
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            margin-top: 10px;
        }
        .provider-badge {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-header">

            <!-- Photo de profil Google -->
            <div th:if="${picture != null}">
                <img th:src="${picture}" class="avatar" alt="Photo de profil"/>
            </div>
            <!-- Placeholder si pas de photo -->
            <div th:if="${picture == null}" class="avatar-placeholder">👤</div>

            <span class="success-badge">✅ Authentifié via Google OAuth2</span>

            <h2 th:text="${name != null ? name : 'Utilisateur'}">Nom</h2>
            <span class="email-badge" th:text="${email != null ? email : 'email@example.com'}">email</span>
        </div>

        <!-- Informations du profil -->
        <table class="info-table">
            <tr>
                <td>👤 Nom complet</td>
                <td th:text="${name != null ? name : 'Non disponible'}">-</td>
            </tr>
            <tr>
                <td>📧 Email</td>
                <td th:text="${email != null ? email : 'Non disponible'}">-</td>
            </tr>
            <tr>
                <td>🌍 Langue</td>
                <td th:text="${locale != null ? locale : 'Non disponible'}">-</td>
            </tr>
            <tr>
                <td>🔑 Fournisseur</td>
                <td>Google (OAuth2 / OIDC)</td>
            </tr>
            <tr>
                <td>🛡️ Token</td>
                <td>ID Token (JWT signé)</td>
            </tr>
        </table>

        <a href="/logout" class="btn-logout">🚪 Déconnexion</a>
        <a href="/" class="btn-home">🏠 Accueil</a>

        <p class="provider-badge">
            🔵 Identité fournie par Google — aucun mot de passe stocké
        </p>
    </div>
</body>
</html>
