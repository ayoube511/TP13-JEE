<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - OAuth2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 45px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo { font-size: 50px; margin-bottom: 15px; }
        h2 { color: #333; margin-bottom: 8px; }
        p { color: #888; margin-bottom: 30px; font-size: 14px; }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 13px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s, box-shadow 0.2s;
            margin-bottom: 12px;
        }
        .btn-google:hover {
            background: #f5f5f5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .google-icon {
            width: 22px;
            height: 22px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #555; }
        .note {
            margin-top: 20px;
            background: #fff8e1;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #888;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔑</div>
        <h2>Connexion</h2>
        <p>Choisissez un fournisseur d'identité pour vous connecter</p>

        <hr class="divider">

        <!-- Connexion Google -->
        <a href="/oauth2/authorization/google" class="btn-google">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuer avec Google
        </a>

        <div class="note">
            ℹ️ Tu seras redirigé vers Google pour t'authentifier. Aucun mot de passe n'est stocké dans cette application.
        </div>

        <a href="/" class="back-link">← Retour à l'accueil</a>
    </div>
</body>
</html>
